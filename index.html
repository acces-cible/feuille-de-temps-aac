// ================================================================
//  PERIOD LOGIC
// ================================================================
const PERIOD = {
  ANCHOR: new Date('2026-04-06T00:00:00'),
  current(){
    const today=new Date(); today.setHours(0,0,0,0);
    const diff=Math.floor((today-this.ANCHOR)/86400000);
    const num=Math.floor(diff/14);
    const start=new Date(this.ANCHOR); start.setDate(start.getDate()+num*14);
    const end=new Date(start); end.setDate(end.getDate()+13);
    return {start,end,key:this.key(start)};
  },
  key(start){
    // Utiliser la date locale pour eviter le decalage UTC
    const y=start.getFullYear(),m=String(start.getMonth()+1).padStart(2,'0'),d=String(start.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  },
  // Format période pour Airtable: "2026-04-06 – 2026-04-19"
  airtableLabel(start,end){
    const ymdLocal=d=>{ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };
    return `${ymdLocal(start)} – ${ymdLocal(end)}`;
  },
  label(start,end){ return `${fmt(start)} – ${fmt(end)}`; },
  getDays(start){
    const days=[];
    for(let i=0;i<14;i++){const d=new Date(start);d.setDate(d.getDate()+i);days.push(d);}
    return days;
  },
  list(numBack=24){
    const periods=[]; const cur=this.current();
    const curIdx=Math.floor((cur.start-this.ANCHOR)/86400000/14);
    for(let i=0;i<=numBack;i++){
      const idx=curIdx-i; if(idx<0)break;
      const s=new Date(this.ANCHOR); s.setDate(s.getDate()+idx*14);
      const e=new Date(s); e.setDate(e.getDate()+13);
      periods.push({start:s,end:e,key:this.key(s)});
    }
    return periods;
  }
};

function fmt(d){ return d.toLocaleDateString('fr-CA',{day:'2-digit',month:'short',year:'numeric'}); }
function dayLabel(d){ return d.toLocaleDateString('fr-CA',{weekday:'short',day:'2-digit',month:'short'}); }
function dayLabelLong(d){ return d.toLocaleDateString('fr-CA',{weekday:'long',day:'numeric',month:'long'}); }
function isWeekend(d){ const w=d.getDay(); return w===0||w===6; }

// Date locale YYYY-MM-DD sans conversion UTC (evite le decalage de fuseau)
function localDateStr(d){
  const date = d || new Date();
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const dd=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function firstName(n){ return (n||'').split(' ')[0]; }

// ================================================================
//  TIME UTILITIES
// ================================================================
function parseTime(str){
  if(!str||!str.toString().trim()) return null;
  let s=str.toString().trim().toLowerCase().replace(',','.');
  // Decimal format: 7.5 → 450 min, 0.5 → 30 min
  if(!s.includes('h')&&!s.includes(':')&&s.includes('.')){
    const val=parseFloat(s);
    return(isNaN(val)||val<0)?null:Math.round(val*60);
  }
  let h=0,m=0;
  if(s.includes('h')){const p=s.split('h');h=parseInt(p[0])||0;m=parseInt(p[1])||0;}
  else if(s.includes(':')){ const p=s.split(':');h=parseInt(p[0])||0;m=parseInt(p[1])||0;}
  else if(/^\d+$/.test(s)){ if(s.length<=2){h=parseInt(s);m=0;}else{h=parseInt(s.slice(0,-2));m=parseInt(s.slice(-2));} }
  else return null;
  if(h<0||h>23||m<0||m>59) return null;
  return h*60+m;
}

function fmtMins(mins){
  if(mins===null||mins===undefined||mins<0) return '—';
  return `${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}`;
}
function calcWorked(s,e,l){ if(s===null||e===null)return null; const w=e-s-(l||0); return w<0?0:w; }

// Convert stored value → HH:MM for <input type="time">
function toTimeVal(str){
  const m=parseTime(str);
  if(m===null) return '';
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

// ================================================================
//  LIVE CALC — updates row total + period total without re-render
// ================================================================
const _syncTimers = {}; // debounce timers: key = "eid-idx"
const _syncLocks  = new Set(); // évite les exécutions parallèles de syncFullSheet

function liveCalc(eid,pk,idx,field,val){
  const sk=`${eid}_${pk}`;
  const sheet=DB.timesheets[sk];
  if(!sheet) return;
  sheet.rows[idx][field]=val;
  const row=sheet.rows[idx];
  const s=parseTime(row.start),e=parseTime(row.end),l=parseTime(row.lunch)||0;
  const worked=(s!==null&&e!==null)?Math.max(0,e-s-l):null;
  const rc=document.getElementById(`row-t-${eid}-${idx}`);
  if(rc) rc.textContent=fmtMins(worked);
  const gt=sheet.rows.reduce((sum,r)=>{
    const rs=parseTime(r.start),re=parseTime(r.end),rl=parseTime(r.lunch)||0;
    if(rs!==null&&re!==null){const d=re-rs-rl;return sum+(d<0?0:d);}
    return sum;
  },0);
  sheet.totalMinutes=gt;
  const gu=document.getElementById('gt-user');   if(gu) gu.textContent=fmtMins(gt);
  const ga=document.getElementById(`gt-${eid}`); if(ga) ga.textContent=fmtMins(gt);
  DataService.save(DB);

  // Debounce: attendre 1.5s sans frappe puis sync TOUTE la feuille en une requete
  // Une seule requete batch = plus fiable, moins de doublons
  const sheetTimerKey = `${eid}-${pk}`;
  clearTimeout(_syncTimers[sheetTimerKey]);
  _syncTimers[sheetTimerKey] = setTimeout(() => {
    syncFullSheetToAirtable(eid, pk);
  }, 1500);
}

// ================================================================
//  BACKUP / EXPORT
// ================================================================
function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}
function autoBackup(db,reason='backup'){
  const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  downloadJSON(db,`fdt_${reason}_${ts}.json`);
}

// ================================================================
//  SHEET FACTORY
// ================================================================
function makeRow(date){
  // Utilise la date locale (pas UTC) pour éviter le décalage de fuseau horaire
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return {date:`${y}-${m}-${d}`,start:'',end:'',lunch:'',notes:'',adminNote:''};
}
function getOrCreateSheet(db,empId,periodKey,periodStart){
  const key=`${empId}_${periodKey}`;
  if(!db.timesheets[key])
    db.timesheets[key]={rows:PERIOD.getDays(periodStart).map(d=>makeRow(d)),approved:false,approvedAt:null,totalMinutes:0};
  return db.timesheets[key];
}
function calcSheetTotal(sheet){
  if(!sheet) return 0;
  return sheet.rows.reduce((sum,r)=>{ const w=calcWorked(parseTime(r.start),parseTime(r.end),parseTime(r.lunch)); return sum+(w||0); },0);
}

// ================================================================
//  STATE  —  currentUser stores the full employee OBJECT (Airtable-ready)
// ================================================================
let DB = DataService.load() || DataService.getDefault();

// Migrate old employee records to new schema
DB.employees.forEach(emp=>{
  if(emp.password===undefined)  emp.password=null;
  if(!emp.email) emp.email=(emp.contactType==='Email'?emp.contact||'':'');
  if(!emp.phone) emp.phone=(emp.contactType==='Phone'?emp.contact||'':'');

  if(emp.inputMode===undefined) emp.inputMode='clock'; // 'clock' | 'text'

  if(emp.airtableId===undefined) emp.airtableId='';
  if(emp.archived===undefined) emp.archived=false;
});
// Migrate timesheet rows
Object.values(DB.timesheets||{}).forEach(sheet=>{
  (sheet.rows||[]).forEach(row=>{ if(row.adminNote===undefined) row.adminNote=''; });
});

// Les employés viennent de Airtable via getEmployees au démarrage.
// On s'assure juste que le schéma local est à jour.
DataService.save(DB);

let state = {
  view:'login',            // login | empPassword | employee | empProfile | admin
  currentUser:null,        // full employee OBJECT (not just id) — or 'admin'
  adminTab:'overview',
  archiveFilter:{name:'',period:''},
  archiveSearch:'',
  archivesLoading:false,
  mergeConflicts:null, mergePending:null,
  showMergeModal:false, showPasswordModal:false,
  showAddEmpModal:false, showRemoveConfirm:null,
  showEditEmpModal:null, showEmpPwResetConfirm:null,
  addEmpForm:{name:'',email:'',phone:'',partTime:false},
  conflictResolutions:{}, bulkOverwrite:false,
  loginPendingEmpId:null,
  empTab:'current',        // 'current' | 'history'
  empHistoryPeriod:null,   // period key selected in history
};
const _archiveLoadedPeriods = new Set();

function save(){ DataService.save(DB); }

function sortedEmployees(){
  return DB.employees
    .filter(e => !e.archived)
    .sort((a,b) => a.name.localeCompare(b.name, "fr", {sensitivity:"base"}));
}

// Convenience: get current employee object regardless of how currentUser is stored
function currentEmp(){
  if(!state.currentUser||state.currentUser==='admin') return null;
  // Support both legacy (id string) and new (object) format
  if(typeof state.currentUser==='object') return DB.employees.find(e=>e.id===state.currentUser.id)||state.currentUser;
  return DB.employees.find(e=>e.id===state.currentUser)||null;
}

// ================================================================
//  RENDER
// ================================================================
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  if     (state.view==='login')       app.appendChild(renderLogin());
  else if(state.view==='empPassword') app.appendChild(renderEmpPasswordScreen());
  else if(state.view==='employee')    app.appendChild(renderEmployee());
  else if(state.view==='empProfile')  app.appendChild(renderEmpProfile());
  else if(state.view==='admin')       app.appendChild(renderAdmin());
  if(state.showMergeModal)        app.appendChild(renderMergeModal());
  if(state.showPasswordModal)     app.appendChild(renderPasswordModal());
  if(state.showAddEmpModal)       app.appendChild(renderAddEmpModal());
  if(state.showRemoveConfirm)     app.appendChild(renderRemoveConfirmModal());
  if(state.showEditEmpModal)      app.appendChild(renderEditEmpModal());
  if(state.showEmpPwResetConfirm) app.appendChild(renderEmpPwResetModal());
}

// ================================================================
//  LOGIN
// ================================================================
function renderLogin(){

  const card=el('div','card p-7 w-full max-w-sm slide-in');

      <div class="inline-block nav-navy text-white rounded-xl px-5 py-3 mb-3">
        <span class="text-2xl font-bold tracking-tight">Feuille de Temps</span>
      </div>
      <p class="text-slate-500 text-sm">Sélectionnez votre nom</p>
    </div>
    <div class="space-y-2">
      ${sortedEmployees().map(emp=>`
        <button onclick="startEmpLogin('${emp.id}')"
          class="w-full text-left px-4 py-3 rounded-xl border border-slate-200 hover:bg-blue-50 hover:border-blue-300 transition-all flex items-center gap-3">
          <div class="w-10 h-10 rounded-full nav-navy flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
            ${emp.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)}
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-semibold text-slate-800">${emp.name}</div>
            <div class="text-xs text-slate-400">${emp.partTime?'Temps partiel':'Temps plein'}</div>
          </div>
          ${emp.password?'<span class="text-slate-300 text-sm">🔒</span>':''}
        </button>`).join('')}
    </div>
    <div class="mt-6 border-t pt-4 text-center">
      <button onclick="toggleAdminArea()" class="text-sm text-slate-400 hover:text-slate-600 underline">Accès administrateur</button>
    </div>
    <div id="admin-login-area" class="hidden mt-3 space-y-2">
      <input type="password" id="admin-pw" placeholder="Mot de passe admin" class="w-full"
        onkeydown="if(event.key==='Enter')tryAdmin()">
      <button onclick="tryAdmin()" class="btn btn-navy w-full">Se connecter</button>
      <div id="admin-err" class="text-red-500 text-xs text-center hidden">Mot de passe incorrect.</div>
    </div>`;
  wrap.appendChild(card);
  return wrap;
}

// Login functions — store full emp object in state.currentUser (Airtable-ready)
function startEmpLogin(id){
  const emp=DB.employees.find(e=>e.id===id);
  if(!emp) return;
  if(emp.password){ state.loginPendingEmpId=id; state.view='empPassword'; render(); }
  else finishEmpLogin(emp);
}

function renderEmpPasswordScreen(){
  const emp=DB.employees.find(e=>e.id===state.loginPendingEmpId);
  if(!emp){state.view='login';return renderLogin();}
  const wrap=el('div','min-h-screen flex flex-col items-center justify-center bg-slate-100 px-4');
  const card=el('div','card p-7 w-full max-w-sm slide-in');
  card.innerHTML=`
    <div class="text-center mb-5">
      <div class="w-16 h-16 rounded-full nav-navy flex items-center justify-center text-white font-bold text-xl mx-auto mb-3">
        ${emp.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)}
      </div>
      <div class="font-bold text-slate-800 text-lg">${emp.name}</div>
      <div class="text-slate-400 text-sm mt-1">Entrez votre mot de passe</div>
    </div>
    <div class="space-y-3">
      <input type="password" id="emp-login-pw" class="w-full text-center text-lg" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')tryEmpLogin()" autofocus>
      <div id="emp-login-err" class="text-red-500 text-xs text-center hidden">Mot de passe incorrect.</div>
      <button onclick="tryEmpLogin()" class="btn btn-navy w-full" style="padding:12px">Connexion</button>
      <button onclick="state.view='login';render()" class="btn btn-light w-full">← Retour</button>
    </div>`;
  wrap.appendChild(card);
  return wrap;
}

function tryEmpLogin(){
  const emp=DB.employees.find(e=>e.id===state.loginPendingEmpId);
  const pw=document.getElementById('emp-login-pw').value;
  if(pw===emp.password) finishEmpLogin(emp);
  else document.getElementById('emp-login-err').classList.remove('hidden');
}

// finishEmpLogin — charge la feuille depuis Airtable puis affiche
async function finishEmpLogin(emp){
  state.currentUser=emp;
  state.view='employee';
  state.loginPendingEmpId=null;
  checkPeriodReset();
  // Afficher immediatement avec donnees locales (cache)
  render();
  // Puis synchroniser depuis Airtable en arriere-plan
  await loadSheetFromAirtable(emp);
}

async function refreshFromAirtable(){
  const emp=currentEmp(); if(!emp) return;
  const btn=document.querySelector('[data-refresh]');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  await loadSheetFromAirtable(emp);
  if(btn){btn.textContent='🔄';btn.disabled=false;}
}

function toggleAdminArea(){
  document.getElementById('admin-login-area').classList.toggle('hidden');
}

function tryAdmin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw===DB.adminPassword){ state.currentUser='admin'; state.view='admin'; checkPeriodReset(); render(); }
  else document.getElementById('admin-err').classList.remove('hidden');
}

function checkPeriodReset(){
  const p=PERIOD.current();
  if(!DB.periodReminderResets[p.key]){
    DB.periodReminderResets[p.key]=true;
    DB.employees.forEach(e=>{e.reminderCount=0;});
    save();
    // Sync le reset vers Airtable pour tous les employés
    DB.employees.forEach(e=>{ if(e.airtableId) syncEmpPrefsToAirtable(e.id); });
  }
}

// ================================================================
//  EMPLOYEE VIEW
// ================================================================
function renderEmployee(){
  const emp=currentEmp();
  if(!emp){state.view='login';return renderLogin();}
  const period=PERIOD.current();
  const sheet=getOrCreateSheet(DB,emp.id,period.key,period.start); save();

// ── Desktop table (Journée | Début | Dîner | Fin | Total | Notes | [Note admin])

        <td><input type="text" class="time-input" placeholder="—" value="${row.end}"

// ── Mobile card (DOM-based, dual mode: clock picker or free text)
function buildMobileCard(row,i,approved,empId,periodKey){
  const d=new Date(row.date+'T00:00:00');
  const weekend=isWeekend(d);
  const card=el('div',`mobile-day-card ${weekend?'weekend':'weekday'}`);
  const s=parseTime(row.start),e=parseTime(row.end),l=parseTime(row.lunch);
  const worked=calcWorked(s,e,l);
  const emp=DB.employees.find(x=>x.id===empId);
  const useClock=(emp?.inputMode||'clock')==='clock';

  if(approved){
    card.innerHTML=`
      <div class="px-4 py-3">
        <div class="flex items-center justify-between mb-1">
          <div class="font-semibold text-slate-700 capitalize text-sm">${dayLabelLong(d)}</div>
          <div class="mono font-bold text-blue-900">${worked!==null?fmtMins(worked):'—'}</div>
        </div>
        <div class="flex gap-4 text-sm text-slate-500">
          ${row.start?`<span>${row.start}</span><span>→</span><span>${row.end||'—'}</span>`:'<span class="italic text-slate-300">Aucune entrée</span>'}
          ${row.lunch?`<span class="text-slate-400">🍽 ${row.lunch}</span>`:''}
        </div>
        ${row.notes?`<div class="text-xs text-slate-400 mt-1">📝 ${row.notes}</div>`:''}
      </div>`;
    return card;
  }

  const inner=el('div','px-4 pt-4 pb-3');

  const headerRow=el('div','flex items-center justify-between mb-3');
  const dayDiv=el('div','font-semibold text-slate-700 capitalize');
  dayDiv.textContent=dayLabelLong(d);
  const totalDiv=el('div','mono font-bold text-blue-900 text-lg');
  totalDiv.id=`row-t-${empId}-${i}`;
  totalDiv.textContent=worked!==null?fmtMins(worked):'—';
  headerRow.appendChild(dayDiv); headerRow.appendChild(totalDiv);
  inner.appendChild(headerRow);

  function makeTimeField(labelTxt,field,stored){
    const col=el('div','');
    const lbl=el('div','field-label mb-1');
    lbl.textContent=labelTxt;
    col.appendChild(lbl);
    if(useClock && field!=='lunch'){
      // Native clock picker — fires immediately on time selection
      const inp=document.createElement('input');
      inp.type='time'; inp.className='mobile-time-input';
      inp.style.cssText='font-size:16px;padding:10px 4px;cursor:pointer;';
      inp.value=toTimeVal(stored);
      const h=()=>liveCalc(empId,periodKey,i,field,inp.value);
      inp.addEventListener('change',h); inp.addEventListener('input',h);
      col.appendChild(inp);
    } else {
      const inp=document.createElement('input');
      inp.type='text'; inp.inputMode='decimal'; inp.className='mobile-time-input';
      inp.placeholder=field==='lunch'?'0.5h':(field==='start'?'9h00':'17h00');
      inp.value=stored||''; inp.autocomplete='off'; inp.autocorrect='off'; inp.spellcheck=false;
      const h=()=>liveCalc(empId,periodKey,i,field,inp.value);
      inp.addEventListener('input',h); inp.addEventListener('keyup',h); inp.addEventListener('change',h);
      col.appendChild(inp);
    }
    return col;
  }

  const grid=el('div','grid grid-cols-3 gap-3 mb-3');
  grid.appendChild(makeTimeField('DÉBUT','start',row.start));
  grid.appendChild(makeTimeField('DÎNER','lunch',row.lunch));
  grid.appendChild(makeTimeField('FIN','end',row.end));
  inner.appendChild(grid);

  const notesWrap=el('div','');
  const notesLbl=el('div','field-label mb-1'); notesLbl.textContent='NOTES';
  const notesInp=document.createElement('input');
  notesInp.type='text'; notesInp.className='mobile-notes-input';
  notesInp.placeholder='Notes optionnelles…'; notesInp.value=row.notes||'';
  const nh=()=>liveCalc(empId,periodKey,i,'notes',notesInp.value);
  notesInp.addEventListener('input',nh); notesInp.addEventListener('change',nh);
  notesWrap.appendChild(notesLbl); notesWrap.appendChild(notesInp);

  const btnRow=el('div','flex gap-2 mt-2');
  const bc=el('button','btn btn-gray flex-1'); bc.style.padding='10px'; bc.textContent='🏖 Congé';
  bc.addEventListener('click',()=>quickFill(empId,periodKey,i,'Congé'));
  const bm=el('button','btn btn-orange flex-1'); bm.style.padding='10px'; bm.textContent='🤒 Maladie';
  bm.addEventListener('click',()=>quickFill(empId,periodKey,i,'Maladie'));
  btnRow.appendChild(bc); btnRow.appendChild(bm);
  notesWrap.appendChild(btnRow);

  inner.appendChild(notesWrap);
  card.appendChild(inner);
  return card;
}

function quickFill(empId,periodKey,rowIdx,value){
  const key=`${empId}_${periodKey}`;
  if(!DB.timesheets[key]) return;
  DB.timesheets[key].rows[rowIdx].notes=value;
  save();
  syncFullSheetToAirtable(empId, periodKey); // sync feuille complete vers Airtable
  render();
}

const _adminNoteTimers = {};
function saveAdminNote(empId,periodKey,rowIdx,value){
  const key=`${empId}_${periodKey}`;
  if(!DB.timesheets[key]) return;
  DB.timesheets[key].rows[rowIdx].adminNote=value;
  DataService.save(DB);
  // Sync vers Airtable avec debounce (1.5s)
  const timerKey=`adminnote-${empId}-${rowIdx}`;
  clearTimeout(_adminNoteTimers[timerKey]);
  _adminNoteTimers[timerKey]=setTimeout(()=>{
    syncFullSheetToAirtable(empId, periodKey);
  }, 1500);
}

function copyYesterday(empId,periodKey){
  const key=`${empId}_${periodKey}`;
  const sheet=DB.timesheets[key]; if(!sheet) return;
  // Utiliser la date locale (pas UTC) pour eviter le decalage de fuseau
  const todayStr=localDateStr();
  const todayIdx=sheet.rows.findIndex(r=>r.date===todayStr);
  if(todayIdx<1){ alert("Impossible de trouver la journée d'hier dans cette période."); return; }
  const yesterday=sheet.rows[todayIdx-1];
  const today=sheet.rows[todayIdx];
  if(today.start||today.end){
    if(!confirm("Des heures sont déjà entrées pour aujourd'hui. Voulez-vous quand même écraser?")) return;
  }
  today.start=yesterday.start; today.end=yesterday.end; today.lunch=yesterday.lunch;
  const gt=sheet.rows.reduce((sum,r)=>{
    const rs=parseTime(r.start),re=parseTime(r.end),rl=parseTime(r.lunch)||0;
    if(rs!==null&&re!==null){const d=re-rs-rl;return sum+(d<0?0:d);}
    return sum;
  },0);
  sheet.totalMinutes=gt;
  save();
  syncFullSheetToAirtable(empId, periodKey); // sync vers Airtable apres copie
  render();
}

function showToast(msg, type='success'){
  const t=document.createElement('div');
  const bg=type==='success'?'bg-green-600':'bg-red-600';
  t.className=`fixed bottom-6 left-1/2 -translate-x-1/2 ${bg} text-white text-sm px-5 py-3 rounded-xl shadow-lg z-[999] transition-opacity duration-500`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),500); },2500);
}

// ── Overview tab
function renderOverview(period){
  const frag=document.createDocumentFragment();

  // ── Avertissement: périodes précédentes non approuvées
  const prevPeriods = PERIOD.list(12).slice(1); // toutes sauf la courante
  const unapprovedPrev = [];
  prevPeriods.forEach(p=>{
    sortedEmployees().forEach(emp=>{
      const sheet = DB.timesheets[`${emp.id}_${p.key}`];
      if(sheet && !sheet.approved && calcSheetTotal(sheet) > 0){
        unapprovedPrev.push({emp, period:p, sheet});
      }
    });
  });
  if(unapprovedPrev.length > 0){
    const warn=el('div','mb-4 bg-red-50 border border-red-200 rounded-xl p-4');
    // Grouper par période
    const byPeriod={};
    unapprovedPrev.forEach(({emp,period:p})=>{
      const lbl=PERIOD.label(p.start,p.end);
      if(!byPeriod[lbl]) byPeriod[lbl]=[];
      byPeriod[lbl].push(emp.name);
    });
    let html='<div class="flex items-start gap-2 mb-2">'
      +'<span class="text-lg">&#x26A0;</span>'
      +'<div><div class="font-semibold text-red-700 text-sm">P&#xe9;riodes pr&#xe9;c&#xe9;dentes non approuv&#xe9;es</div>'
      +'<div class="text-xs text-red-600 mt-0.5">Ces feuilles ont des heures mais ne sont pas approuv&#xe9;es.</div></div></div>';
    Object.entries(byPeriod).forEach(([lbl,names])=>{
      html+=`<div class="mt-2 flex items-start justify-between gap-2">`
        +`<div><div class="text-xs font-semibold text-red-700">${lbl}</div>`
        +`<div class="text-xs text-red-500">${names.join(', ')}</div></div>`
        +`<button onclick="state.adminTab='archives';state.archiveFilter.period='${Object.values(byPeriod)[0]?PERIOD.list(12).find(p=>PERIOD.label(p.start,p.end)===lbl)?.key:''}';render()" `
        +`class="btn btn-red text-xs flex-shrink-0">Voir</button>`
        +`</div>`;
    });
    warn.innerHTML=html;
    frag.appendChild(warn);
  }

  const sheets=sortedEmployees().map(emp=>({emp,sheet:DB.timesheets[`${emp.id}_${period.key}`]}));
  const approvedCount=sheets.filter(s=>s.sheet?.approved).length;
  const total=sheets.length;
  const pct=total>0?Math.round(approvedCount/total*100):0;
  const totalApprovedMins=sheets.filter(s=>s.sheet?.approved).reduce((sum,s)=>sum+(s.sheet.totalMinutes||0),0);
  const totalPendingMins=sheets.filter(s=>!s.sheet?.approved).reduce((sum,s)=>sum+calcSheetTotal(s.sheet),0);

  const metrics=el('div','');
  metrics.innerHTML=`
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
      <div class="card px-5 py-4">
        <div class="field-label mb-1">Progression</div>
        <div class="flex items-center gap-2 mb-2">
          <span class="text-2xl font-bold text-slate-800">${approvedCount}/${total}</span>
          <span class="text-slate-400 text-sm">approuvé(s)</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-3">
          <div class="progress-bar-inner bg-green-500 h-3 rounded-full" style="width:${pct}%"></div>
        </div>
        <div class="text-xs text-slate-400 mt-1">${pct}% complété</div>
      </div>
      <div class="card px-5 py-4">
        <div class="field-label mb-1">Heures approuvées</div>
        <div class="text-2xl font-bold text-green-700 mono">${fmtMins(totalApprovedMins)}</div>
      </div>
      <div class="card px-5 py-4">
        <div class="field-label mb-1">Heures en attente</div>
        <div class="text-2xl font-bold text-orange-600 mono">${fmtMins(totalPendingMins)}</div>
      </div>
    </div>`;
  frag.appendChild(metrics);

  const actions=el('div','mb-4 flex flex-wrap gap-2');
  actions.innerHTML=`
    <button onclick="approveAll('${period.key}')" class="btn btn-green">✓✓ Approuver tous</button>
    <button onclick="remindAll()" class="btn btn-orange">📣 Rappeler tous</button>`;
  frag.appendChild(actions);

  sheets.forEach(({emp,sheet})=>{
    const tot=calcSheetTotal(sheet);
    const isZero=tot===0;
    const bc=isZero?(emp.partTime?'border-l-4 border-purple-400':'border-l-4 border-red-400'):'border-l-4 border-transparent';
    const card=el('div',`card mb-3 overflow-hidden ${bc}`);
    const ch=el('div','px-4 py-3 flex flex-wrap items-center justify-between gap-2 bg-slate-50 border-b');
    ch.innerHTML=`

        <div class="w-8 h-8 rounded-full nav-navy flex items-center justify-center text-white font-bold text-xs flex-shrink-0">
          ${emp.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)}

          <div class="text-xs text-slate-400">${emp.partTime?'Temps partiel':'Temps plein'} · 📧 ${emp.email||'—'} · 📱 ${emp.phone||'—'}</div>
        </div>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <span class="mono text-sm font-semibold ${isZero?(emp.partTime?'text-purple-600':'text-red-600'):'text-slate-700'}" id="gt-${emp.id}">${fmtMins(tot)}</span>
        ${sheet?.approved
          ?`<span class="badge-approved">✓ Approuvé</span><button onclick="unlockSheet('${emp.id}','${period.key}')" class="btn btn-gray text-xs">🔓 Déverrouiller</button>`
          :`<span class="badge-pending">En attente</span><button onclick="approveSheet('${emp.id}','${period.key}')" class="btn btn-green text-xs">✓ Approuver</button>`}
        <button onclick="sendReminder('${emp.id}')" class="btn btn-blue text-xs">⏰ Rappel</button>
        ${isZero?`<span class="text-xs ${emp.partTime?'text-purple-600':'text-red-600'} font-semibold">⚠ 0h</span>`:''}
      </div>`;
    card.appendChild(ch);
    const s2=getOrCreateSheet(DB,emp.id,period.key,period.start); save();
    if(!s2._synced){ s2._synced=true; loadSheetFromAirtable(emp); }
    const sw=el('div','overflow-x-auto p-2');
    const inner=el('div','card overflow-x-auto');
    inner.appendChild(buildDesktopTable(s2,true,emp.id,period));
    sw.appendChild(inner); card.appendChild(sw);
    frag.appendChild(card);
  });
  return frag;
}

async function approveSheet(empId,periodKey){
  const key=`${empId}_${periodKey}`;
  if(!DB.timesheets[key]){const p=PERIOD.current();getOrCreateSheet(DB,empId,periodKey,p.start);}
  DB.timesheets[key].approved=true; DB.timesheets[key].approvedAt=new Date().toISOString();
  DB.timesheets[key].totalMinutes=calcSheetTotal(DB.timesheets[key]);
  save(); autoBackup(DB,'approve'); render();
  // Sync vers Airtable en arrière-plan (pas de await pour ne pas bloquer l'UI)
  syncApprovalToAirtable(empId, periodKey, true);
}

async function approveAll(periodKey){
  const period=PERIOD.current();
  const toSync=[];
  DB.employees.forEach(emp=>{
    const key=`${emp.id}_${periodKey}`;
    if(!DB.timesheets[key]) getOrCreateSheet(DB,emp.id,periodKey,period.start);
    if(!DB.timesheets[key].approved){
      DB.timesheets[key].approved=true; DB.timesheets[key].approvedAt=new Date().toISOString();
      DB.timesheets[key].totalMinutes=calcSheetTotal(DB.timesheets[key]);
      toSync.push(emp.id);
    }
  });
  save(); autoBackup(DB,'approve-all'); render();
  // Sync vers Airtable en arrière-plan
  toSync.forEach(empId => syncApprovalToAirtable(empId, periodKey, true));
}

function unlockSheet(empId,periodKey){
  const key=`${empId}_${periodKey}`;
  if(DB.timesheets[key]){DB.timesheets[key].approved=false;DB.timesheets[key].approvedAt=null;}
  save(); render();
  syncApprovalToAirtable(empId, periodKey, false); // décoche Approuvé dans Airtable
}

async function sendReminder(empId) {
  const emp = DB.employees.find(e => e.id === empId);
  if (!emp || !emp.airtableId) {
    alert("Erreur : ID Airtable manquant pour cet employé.");
    return;
  }
  try {
    const resp = await fetch('/api/updateemployee', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ airtableId: emp.airtableId, sendReminder: true })
    });
    if (resp.ok) {
      alert(`✅ Rappel envoyé à ${emp.name}.`);
    } else {
      alert("Erreur lors de l'envoi du rappel.");
    }
  } catch(e) {
    alert("Erreur de connexion.");
  }
}

async function remindAll(){
  const toRemind = DB.employees.filter(e => e.airtableId);
  if(toRemind.length === 0){ alert('Aucun employé avec un ID Airtable.'); return; }
  let sent = 0, errors = 0;
  for(const emp of toRemind){
    try{
      const resp = await fetch('/api/updateemployee', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ airtableId: emp.airtableId, sendReminder: true })
      });
      if(resp.ok) sent++; else errors++;
    } catch(e){ errors++; }
  }
  if(errors > 0) alert(`Rappels envoyés: ${sent}. Erreurs: ${errors}.`);
  else alert(`${sent} rappel(s) envoyé(s) !`);
  render();
}

    }).join('')}</tbody></table>`;

  const search=state.archiveSearch;
  function hl(text){
    if(!search||!text) return text||'';
    return text.replace(new RegExp(`(${search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark class="highlight-search">$1</mark>');
  }
  let rows=[];
  (summaryPeriods||[]).filter(Boolean).forEach(p=>{
    (summaryEmp||[]).filter(Boolean).forEach(emp=>{
      const k=`${emp.id}_${p.key}`,sheet=DB.timesheets[k]; if(!sheet) return;

        if(search&&(!row.notes||!row.notes.toLowerCase().includes(search.toLowerCase()))) return;

      });
    });
  });
  const detailCard=el('div','card overflow-x-auto');
  detailCard.innerHTML=`<table>
    <thead><tr class="nav-navy">
      <th class="text-left pl-3">Employé</th><th>Période</th><th>Date</th>
      <th>Début</th><th>Dîner</th><th>Fin</th><th>Total</th><th>Notes</th><th>Statut</th>
    </tr></thead>
    <tbody>${rows.map(({emp,period,row,sheet})=>{
      const d=new Date(row.date+'T00:00:00');
      const w=calcWorked(parseTime(row.start),parseTime(row.end),parseTime(row.lunch));
      return `<tr class="${isWeekend(d)?'bg-weekend':'bg-day'}">
        <td class="text-left pl-3 text-xs font-medium">${emp.name}</td>
        <td class="text-xs">${PERIOD.label(period.start,period.end)}</td>
        <td class="text-xs mono">${dayLabel(d)}</td>
        <td class="mono text-xs">${row.start||'—'}</td>
        <td class="mono text-xs">${row.lunch||'—'}</td>
        <td class="mono text-xs">${row.end||'—'}</td>
        <td class="total-cell text-xs">${w!==null?fmtMins(w):'—'}</td>
        <td class="text-xs">${hl(row.notes)}</td>
        <td>${sheet.approved
          ?`<span class="badge-approved">✓ Approuvé</span> <button onclick="unlockSheet('${emp.id}','${period.key}')" class="btn btn-gray text-xs">🔓</button>`
          :`<button onclick="approveSheet('${emp.id}','${period.key}')" class="btn btn-green text-xs">✓ Approuver</button>`}</td>
      </tr>`;
    }).join('')}
    ${rows.length===0?'<tr><td colspan="9" class="text-center text-slate-400 py-6">Aucun résultat.</td></tr>':''}
    </tbody></table>`;
  frag.appendChild(detailCard);
  return frag;
}

// ================================================================
//  IMPORT / MERGE
// ================================================================
function handleImport(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      let inc=JSON.parse(e.target.result);
      if(inc.db) inc=inc.db;
      autoBackup(DB,'pre-merge');
      const conflicts=[];
      Object.keys(inc.timesheets||{}).forEach(k=>{
        if(DB.timesheets[k]&&JSON.stringify(DB.timesheets[k])!==JSON.stringify(inc.timesheets[k]))
          conflicts.push({type:'timesheet',key:k,current:DB.timesheets[k],incoming:inc.timesheets[k]});
      });
      (inc.employees||[]).forEach(e=>{
        const cur=DB.employees.find(x=>x.id===e.id);
        if(cur&&JSON.stringify(cur)!==JSON.stringify(e))
          conflicts.push({type:'employee',key:e.id,current:cur,incoming:e});
      });
      if(conflicts.length===0){mergeDB(inc);alert('Import réussi!');render();}
      else{
        state.mergePending=inc; state.mergeConflicts=conflicts;
        state.conflictResolutions={}; conflicts.forEach(c=>state.conflictResolutions[c.key]='keep');
        state.bulkOverwrite=false; state.showMergeModal=true; render();
      }
    }catch(err){alert('Erreur JSON: '+err.message);}
  };
  reader.readAsText(file); event.target.value='';
}

function mergeDB(inc){
  Object.keys(inc.timesheets||{}).forEach(k=>{if(!DB.timesheets[k])DB.timesheets[k]=inc.timesheets[k];});
  (inc.employees||[]).forEach(e=>{if(!DB.employees.find(x=>x.id===e.id))DB.employees.push(e);});
  if(inc.reminderTemplate) DB.reminderTemplate=inc.reminderTemplate;
  save();
}

function applyMerge(){
  const inc=state.mergePending; if(!inc) return;
  state.mergeConflicts.forEach(c=>{
    const res=state.bulkOverwrite?'overwrite':state.conflictResolutions[c.key];
    if(res==='overwrite'){
      if(c.type==='timesheet') DB.timesheets[c.key]=c.incoming;
      else{const idx=DB.employees.findIndex(e=>e.id===c.key);if(idx>=0)DB.employees[idx]=c.incoming;}
    }
  });
  mergeDB(inc); state.showMergeModal=false; state.mergePending=null; state.mergeConflicts=null;
  alert('Fusion terminée.'); render();
}

async function loadSheetFromAirtable(emp, periodOverride){
  if(!emp||!emp.airtableId){ console.warn('loadSheet: pas airtableId'); return; }
  const period = periodOverride || PERIOD.current();
  const ymd=d=>{ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; };
  const ps=ymd(period.start), pe=ymd(period.end);
  console.log(`loadSheet: ${emp.name} | ${ps} → ${pe}`);
  try{
    const resp=await fetch(`/api/gettimesheet?empId=${encodeURIComponent(emp.airtableId)}&periodStart=${ps}&periodEnd=${pe}`);
    if(!resp.ok){ console.warn('getTimesheet status:', resp.status, await resp.text()); return; }
    const json=await resp.json();
    const atRows=json.rows||[];
    console.log(`getTimesheet retourne ${atRows.length} ligne(s) pour ${emp.name}`);
    if(!atRows.length){ console.log('Aucune ligne Airtable — localStorage conservé'); return; }
    const sheet=getOrCreateSheet(DB,emp.id,period.key,period.start);
    let changed=false;
    atRows.forEach(at=>{
      const lr=sheet.rows.find(r=>r.date===at.date); if(!lr) return;
      // Cacher l'ID Airtable pour les PATCHs directs futurs
      if(at.airtableRecordId && lr.airtableRecordId!==at.airtableRecordId){lr.airtableRecordId=at.airtableRecordId;changed=true;}
      // Ne pas écraser une valeur non-vide avec du vide (doublons Airtable incomplets)
      if(at.start     && at.start!==lr.start)    {lr.start=at.start;changed=true;}
      if(at.end       && at.end!==lr.end)        {lr.end=at.end;changed=true;}
      if(at.lunch     && at.lunch!==lr.lunch)    {lr.lunch=at.lunch;changed=true;}
      if(at.notes!==undefined&&at.notes!==lr.notes){lr.notes=at.notes;changed=true;}
      if(at.adminNote!==undefined&&at.adminNote!==lr.adminNote){lr.adminNote=at.adminNote;changed=true;}
    });
    sheet.totalMinutes=calcSheetTotal(sheet);
    if(changed){ save(); render(); console.log(`✅ Feuille mise à jour: ${emp.name}`); }
    else{ console.log(`Feuille déjà à jour: ${emp.name}`); }
  }catch(e){ console.warn('loadSheetFromAirtable erreur:', e.message); }
}

async function loadArchivePeriod(periodKey){
  if(_archiveLoadedPeriods.has(periodKey)) return;
  const period = PERIOD.list(24).find(p => p.key === periodKey);
  if(!period) return;
  state.archivesLoading = true; render();
  await Promise.allSettled(DB.employees.map(emp => loadSheetFromAirtable(emp, period)));
  _archiveLoadedPeriods.add(periodKey);
  state.archivesLoading = false; render();
}

async function refreshArchives(){
  const filterPeriod = state.archiveFilter.period;
  const periods = filterPeriod
    ? [PERIOD.list(24).find(p => p.key === filterPeriod)].filter(Boolean)
    : PERIOD.list(24).slice(1, 4);
  const filterEmp = state.archiveFilter.name;
  const emps = filterEmp ? [DB.employees.find(e => e.id === filterEmp)].filter(Boolean) : DB.employees;
  state.archivesLoading = true; render();
  for(const period of periods){
    await Promise.allSettled(emps.map(emp => loadSheetFromAirtable(emp, period)));
    _archiveLoadedPeriods.add(period.key);
  }
  state.archivesLoading = false; render();
}

// Sync toute la feuille d'un employe vers Airtable
// Envoie chaque ligne avec données séparément pour compatibilité maximale
async function syncFullSheetToAirtable(eid, pk){
  const emp = DB.employees.find(e => e.id === eid) || currentEmp();
  if(!emp || !emp.airtableId){ console.log('syncFullSheet: pas airtableId pour', eid); return; }
  const sheetKey = pk ? `${eid}_${pk}` : `${emp.id}_${PERIOD.current().key}`;
  if(_syncLocks.has(sheetKey)){ console.log('syncFullSheet: déjà en cours, skip', sheetKey); return; }
  _syncLocks.add(sheetKey);
  const sheet = DB.timesheets[sheetKey];
  if(!sheet){ _syncLocks.delete(sheetKey); return; }
  const period = PERIOD.current();
  const periodLabel = PERIOD.airtableLabel(period.start, period.end);

  // Envoyer chaque ligne qui a des données — une requête par ligne
  const rowsWithData = sheet.rows.filter(r => r.start || r.end || r.notes || r.adminNote);
  console.log(`syncFullSheet: ${emp.name} | ${rowsWithData.length} lignes à sync`);

  let idsCached = false;
  try {
    for(const row of rowsWithData){
      const data = {
        empId:           emp.airtableId,
        date:            row.date,
        start:           row.start     || '',
        end:             row.end       || '',
        lunch:           row.lunch     || '',
        notes:           row.notes     || '',
        adminNote:       row.adminNote || '',
        periodeDePaie:   periodLabel,
        recordId:        row.airtableRecordId || undefined
      };
      try{
        const resp = await fetch('/api/syncairtable',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(data)
        });
        if(resp.ok){
          const json = await resp.json();
          if(json.recordId && row.airtableRecordId !== json.recordId){
            row.airtableRecordId = json.recordId;
            idsCached = true;
          }
          console.log(`  ✅ ${row.date} (${json.recordId})`);
        } else { console.error(`  ❌ ${row.date}:`, resp.status, await resp.text()); }
      }catch(e){ console.error(`  ❌ ${row.date}:`, e.message); }
    }
    if(idsCached) save();
  } finally {
    _syncLocks.delete(sheetKey);
  }
}

// ================================================================
//  AIRTABLE SYNC
// ================================================================

// Sync une ligne de timesheet vers Airtable.
// Appelé par liveCalc (avec debounce) et quickFill.
// empId optionnel — si absent, utilise currentEmp() (vue employé)
//                   si fourni, permet à l'admin de syncer la feuille d'un autre
async function syncRowToAirtable(eid, pk, idx){
  // Trouver l'employé dans DB par son id local
  const emp = DB.employees.find(e => e.id === eid) || currentEmp();
  if(!emp || !emp.airtableId){
    console.log('syncRowToAirtable: pas d\'airtableId pour', eid, '— skip');
    return;
  }

  const sheetKey = pk ? `${eid}_${pk}` : `${emp.id}_${PERIOD.current().key}`;
  const sheet = DB.timesheets[sheetKey];
  if(!sheet) return;

  const row = sheet.rows[idx];
  if(!row) return;

  // Calculer la période de paie pour cette ligne
  const period = PERIOD.current();
  const periodLabel = PERIOD.airtableLabel(period.start, period.end);

  const data = {
    empId:          emp.airtableId,
    date:           row.date,
    start:          row.start     || '',
    end:            row.end       || '',
    lunch:          row.lunch     || '',
    notes:          row.notes     || '',
    adminNote:      row.adminNote || '',   // Note privée admin → champ "Note Admin" Airtable
    periodeDePaie:  periodLabel
  };

  try {
    const resp = await fetch('/api/syncairtable', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if(resp.ok){
      const result = await resp.json();
      // Sauvegarder le recordId Airtable dans la ligne pour les PATCH directs futurs
      if(result.recordId && row){
        row.airtableRecordId = result.recordId;
        save();
      }
      console.log(`✅ Airtable sync: ${emp.name} / ${row.date} → ${result.recordId}`);
    } else {
      const err = await resp.text();
      console.error(`❌ Airtable sync erreur ${resp.status}:`, err);
    }
  } catch(error){
    console.error('syncRowToAirtable fetch error:', error.message);
  }
}

// Coche "Approuvé" sur toutes les lignes Airtable d'un employé pour une période
// Appelé par approveSheet() et approveAll()
async function syncApprovalToAirtable(empId, periodKey, approved){
  const emp = DB.employees.find(e => e.id === empId);
  if(!emp || !emp.airtableId) return;

  const sheetKey = `${empId}_${periodKey}`;
  const sheet = DB.timesheets[sheetKey];
  if(!sheet) return;

  // Calculer la période de paie
  const periodStart = new Date(periodKey + 'T00:00:00');
  const periodEnd   = new Date(periodStart); periodEnd.setDate(periodEnd.getDate()+13);
  const periodLabel = PERIOD.airtableLabel(periodStart, periodEnd);

  // On n'envoie que les lignes qui ont au moins une heure saisie
  const rowsWithData = sheet.rows.filter(r => r.start || r.end || r.notes);
  const filteredPromises = rowsWithData.map(row => {
    const data = {
      empId:         emp.airtableId,
      date:          row.date,
      periodeDePaie: periodLabel,
      approved:      approved,
      start: row.start || '',
      end:   row.end   || '',
      lunch: row.lunch || '',
      notes: row.notes || '',
      recordId: row.airtableRecordId || undefined
    };
    return fetch('/api/syncairtable', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(async resp => {
      if(resp.ok){
        const result = await resp.json();
        if(result.recordId && row) { row.airtableRecordId = result.recordId; }
      }
    }).catch(e => console.error('syncApproval row error:', e.message));
  });

  await Promise.allSettled(filteredPromises);
  console.log(`✅ Approval synced to Airtable: ${emp.name} approved=${approved}`);
}

function el(tag,className){ const e=document.createElement(tag); if(className)e.className=className; return e; }
function logout(){ state.currentUser=null; state.view='login'; state.adminTab='overview'; render(); }

// ================================================================
//  INIT — charge les employés depuis Airtable au démarrage
// ================================================================

function renderLoading(msg){
  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="min-h-screen flex flex-col items-center justify-center bg-slate-100 gap-4">
      <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full" style="animation:spin 1s linear infinite"></div>
      <p class="text-slate-500 text-sm">${msg||'Chargement…'}</p>
    </div>`;
}

async function init(){
  renderLoading('Chargement des employés…');

  try {
    const resp = await fetch('/api/getemployees');
    if(resp.ok){
      const apiEmployees = await resp.json();

      // Fusionner les employés Airtable avec le localStorage
      // - Airtable = source de vérité pour nom, email, téléphone, airtableId, partTime
      // - localStorage = source de vérité pour password, reminderCount, inputMode, autoFill
      const merged = apiEmployees.map(apiEmp => {
        const local = DB.employees.find(e =>
          e.airtableId === apiEmp.airtableId || e.id === apiEmp.airtableId
        );
        return {
          id:            apiEmp.airtableId,
          name:          apiEmp.name,
          email:         apiEmp.email        || '',
          phone:         apiEmp.phone        || '',
          airtableId:    apiEmp.airtableId,
          // Airtable = source de verite pour toutes les preferences
          partTime:      apiEmp.partTime      ?? local?.partTime      ?? false,
          inputMode:     apiEmp.inputMode     || local?.inputMode     || 'clock',
          autoFill:      apiEmp.autoFill      ?? local?.autoFill      ?? false,
          // Si la période courante a déjà été réinitialisée localement, garder 0
          // (évite de recharger l'ancien compteur d'une période précédente depuis Airtable)
          reminderCount: DB.periodReminderResets[PERIOD.current().key]
            ? (local?.reminderCount ?? 0)
            : (apiEmp.reminderCount ?? local?.reminderCount ?? 0),
          // Mot de passe: Airtable en priorité, fallback localStorage
          password:      apiEmp.password !== undefined ? apiEmp.password : (local?.password ?? null),
          archived:      local?.archived      ?? false,
          // Migration timesheets
          _oldId:        local?.id || null,
        };
      });

      // ── Migration des timesheets: renommer les clés de l'ancien ID vers rec...
      // ex: "emp1_2026-04-06" → "rec1OAp0t7_2026-04-06"
      const newTimesheets = {};
      Object.entries(DB.timesheets || {}).forEach(([key, sheet]) => {
        let newKey = key;
        merged.forEach(emp => {
          if(emp._oldId && emp._oldId !== emp.id) {
            // Remplacer l'ancien préfixe par le nouveau (rec...)
            const oldPrefix = emp._oldId + '_';
            const newPrefix = emp.id + '_';
            if(key.startsWith(oldPrefix)) {
              newKey = key.replace(oldPrefix, newPrefix);
            }
          }
        });
        newTimesheets[newKey] = sheet;
      });
      DB.timesheets = newTimesheets;

      // Nettoyer le _oldId avant de sauvegarder
      merged.forEach(e => delete e._oldId);
      DB.employees = merged;
      DataService.save(DB);
      console.log(`✅ ${merged.length} employé(s) chargé(s) depuis Airtable`);
    } else {
      console.warn(`getEmployees → ${resp.status} — utilisation du cache localStorage`);
    }
  } catch(e){
    console.warn('getEmployees inaccessible:', e.message, '— utilisation du cache localStorage');
  }

  render();
}

  s.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(s);
})();

init();
